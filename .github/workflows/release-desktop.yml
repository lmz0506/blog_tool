name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $desktopPackageVersion = (Get-Content desktop/package.json -Raw | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($packageVersion -ne $tagVersion) {
            throw "package.json version ($packageVersion) does not match tag version ($tagVersion)."
          }
          if ($desktopPackageVersion -ne $tagVersion) {
            throw "desktop/package.json version ($desktopPackageVersion) does not match tag version ($tagVersion)."
          }
          if ($desktopPackageVersion -ne $packageVersion) {
            throw "desktop/package.json version ($desktopPackageVersion) does not match package.json version ($packageVersion)."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Build installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
        run: |
          New-Item -ItemType Directory -Force -Path $env:ELECTRON_CACHE, $env:ELECTRON_BUILDER_CACHE | Out-Null
          npx electron-builder --config electron-builder.config.cjs --win nsis --publish never

      # Upload release assets explicitly to avoid electron-builder creating
      # duplicate GitHub releases for the same tag under concurrent uploads.
      - name: Compute release metadata
        id: release_meta
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          "release_name=${{ github.ref_name }}" -replace '^release_name=v', 'release_name=' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload manual build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: blogtool-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
